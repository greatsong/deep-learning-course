site_name: "딥러닝 여행: AI는 어떻게 생각할까?"
site_description: "고등학교 2학년 인공지능 기초 — 10차시 이론+실습 교재"
site_author: "석리송"

theme:
  name: material
  language: ko
  palette:
    - scheme: default
      primary: teal
      accent: orange
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - scheme: slate
      primary: teal
      accent: orange
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.instant
    - navigation.tabs
    - navigation.top
    - navigation.footer
    - navigation.sections
    - toc.integrate
  icon:
    logo: material/robot-outline
  font:
    text: Noto Sans KR
    code: JetBrains Mono

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_css:
  - assets/extra.css

nav:
  - "시작하기": index.md
  - "섹션 1 — 숫자로 이해하는 세상":
    - "0. AI, 70년의 꿈": section1/ch0-history.md
    - "1. AI는 왜 글자를 못 셀까?": section1/ch1-tokenization.md
    - "2. AI에게 창의적인 답을 시키려면?": section1/ch2-probability.md
    - "3. 단어로 산수를 할 수 있다고?": section1/ch3-embedding.md
  - "섹션 2 — 딥러닝 I":
    - "4. AI야, 이게 뭔지 맞혀봐": section2/ch4-teachable-machine.md
    - "5. 최소 뉴런으로 문제를 풀어라": section2/ch5-perceptron.md
    - "6. 잘했는지 못했는지, 어떻게 알지?": section2/ch6-loss.md
    - "7. 모르면 어떻게 하나요?": section2/ch7-gradient-descent.md
  - "섹션 3 — 딥러닝 II":
    - "8. AI는 어디를 집중해서 볼까?": section3/ch8-attention.md
    - "9. ChatGPT 답이 왜 한 글자씩 나올까?": section3/ch9-transformer.md
  - "교사용 지도서":
    - "수업 운영 가이드": teacher-guide/overview.md
    - "0차시 지도안": teacher-guide/tg0-history.md
    - "1차시 지도안": teacher-guide/tg1-tokenization.md
    - "2차시 지도안": teacher-guide/tg2-probability.md
    - "3차시 지도안": teacher-guide/tg3-embedding.md
    - "4차시 지도안": teacher-guide/tg4-teachable-machine.md
    - "5차시 지도안": teacher-guide/tg5-perceptron.md
    - "6차시 지도안": teacher-guide/tg6-loss.md
    - "7차시 지도안": teacher-guide/tg7-gradient-descent.md
    - "8차시 지도안": teacher-guide/tg8-attention.md
    - "9차시 지도안": teacher-guide/tg9-transformer.md
